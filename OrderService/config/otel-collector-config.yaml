# Splunk Distribution of OpenTelemetry Collector - minimal config
# Receives OTLP from order-service, exports traces and logs to Splunk Observability Cloud.
# Set SPLUNK_ACCESS_TOKEN and SPLUNK_REALM in the collector service environment.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  # Host CPU, memory, etc. root_path points at host fs when / is mounted at /hostfs in compose.
  hostmetrics:
    root_path: /hostfs
    collection_interval: 30s
    scrapers:
      cpu: {}
      memory: {}
      load: {}
      process: {}
      disk: {}
      filesystem: {}
      network: {}
      paging: {}
      processes: {}
      system: {}

processors:
  # Add host.name (and other attributes) from OTEL_RESOURCE_ATTRIBUTES on the collector so hostmetrics get a stable host identity.
  resourcedetection/host:
    detectors: [env, system]
    timeout: 5s
    system:
      hostname_sources: [os, cname]

exporters:
  # Log received data to stdout (so docker compose logs shows it)
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 5
  # Verbose metrics logging so you can see hostmetrics (CPU, memory, load) in collector logs
  debug/metrics:
    verbosity: detailed
    sampling_initial: 2
    sampling_thereafter: 2
  # Splunk Observability Cloud ingest (traces + metrics).
  otlp_http/splunk:
    traces_endpoint: https://ingest.${env:SPLUNK_REALM}.signalfx.com/v2/trace/otlp
    metrics_endpoint: https://ingest.${env:SPLUNK_REALM}.signalfx.com/v2/datapoint/otlp
    headers:
      "X-SF-Token": "${env:SPLUNK_ACCESS_TOKEN}"
  # Splunk Observability Cloud ingest for logs/profiling payloads.
  splunk_hec/splunk:
    token: "${env:SPLUNK_ACCESS_TOKEN}"
    endpoint: "https://ingest.${env:SPLUNK_REALM}.signalfx.com/v1/log"
    source: "otel"
    sourcetype: "otel"

service:
  telemetry:
    logs:
      level: debug
      development: true
      encoding: console
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [debug, otlp_http/splunk]
    metrics:
      receivers: [otlp, hostmetrics]
      processors: [resourcedetection/host]
      exporters: [debug, debug/metrics, otlp_http/splunk]
    logs:
      receivers: [otlp]
      exporters: [debug, splunk_hec/splunk]
